<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFlow Intelligence Log</title>
    <style>
        body { font-family: Consolas, "Courier New", monospace; background-color: #0b1120; color: #d4d4d4; margin: 0; padding: 20px; font-size: 14px; }
        .log { white-space: pre-wrap; word-wrap: break-word; margin: 5px 0; border-bottom: 1px solid #1e293b; padding: 5px 0; }
        .log-info { color: #94a3b8; }
        .log-warn { color: #facc15; }
        .log-error { color: #f87171; font-weight: bold; }
        .log-success { color: #4ade80; font-weight: bold; }
        .timestamp { color: #64748b; font-size: 0.9em; margin-right: 10px; }
        .controls { position: sticky; top: 0; background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(8px); padding: 15px 0; border-bottom: 1px solid #1e293b; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; z-index: 100; }
        #filterInput { background: #1e293b; border: 1px solid #334155; color: #d4d4d4; padding: 6px 12px; border-radius: 20px; width: 220px; outline: none; }
        .filters { display: flex; gap: 12px; align-items: center; font-size: 0.85rem; }
        .filter-cb { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .btn-dl { background: var(--secondary, #6366f1); border: none; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .scroll-btn { position: fixed; right: 20px; width: 40px; height: 40px; background: #334155; border: 1px solid #475569; color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: opacity 0.2s; z-index: 90; }
        #scrollTopBtn { bottom: 70px; }
        #scrollBottomBtn { bottom: 20px; }
    </style>
    <script>
        function scrollToBottom() { window.scrollTo(0, document.body.scrollHeight); }
        function scrollToTop() { window.scrollTo(0, 0); }
        function downloadRawLog() {
            let text = "";
            document.querySelectorAll('.log').forEach(el => text += el.innerText + "\n");
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'autoflow-engine.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        function filterLogs() {
            const f = document.getElementById('filterInput').value.toLowerCase();
            const si = document.getElementById('cbInfo').checked, ss = document.getElementById('cbSuccess').checked, sw = document.getElementById('cbWarn').checked, se = document.getElementById('cbError').checked;
            document.querySelectorAll('.log').forEach(log => {
                const lvl = log.getAttribute('data-level');
                const show = (lvl==='info'&&si)||(lvl==='success'&&ss)||(lvl==='warn'&&sw)||(lvl==='error'&&se);
                log.style.display = (show && log.innerText.toLowerCase().includes(f)) ? '' : 'none';
            });
        }
        window.onload = () => {
            scrollToBottom();
            ['filterInput','cbInfo','cbSuccess','cbWarn','cbError'].forEach(id => document.getElementById(id).addEventListener(id==='filterInput'?'input':'change', filterLogs));
        };
        setInterval(() => {
            fetch(window.location.href).then(r => r.text()).then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const nc = doc.getElementById('log-container');
                if (nc) {
                    const cc = document.getElementById('log-container');
                    if (nc.childElementCount !== cc.childElementCount) {
                        const bottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;
                        cc.innerHTML = nc.innerHTML;
                        filterLogs();
                        if (bottom) scrollToBottom();
                    }
                }
            });
        }, 3000);
    </script>
</head>
<body>
    <div class="controls">
        <h1 style="margin:0; font-size: 1.25em; font-weight: 900; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AutoFlow Engine Log</h1>
        <div class="filters">
            <label class="filter-cb"><input type="checkbox" id="cbInfo" checked> INFO</label>
            <label class="filter-cb" style="color:#4ade80"><input type="checkbox" id="cbSuccess" checked> SUCCESS</label>
            <label class="filter-cb" style="color:#facc15"><input type="checkbox" id="cbWarn" checked> WARN</label>
            <label class="filter-cb" style="color:#f87171"><input type="checkbox" id="cbError" checked> ERROR</label>
            <input type="text" id="filterInput" placeholder="Filter streams...">
            <button class="btn-dl" onclick="downloadRawLog()">DOWNLOAD .TXT</button>
        </div>
    </div>
    <button class="scroll-btn" id="scrollTopBtn" onclick="scrollToTop()">▲</button>
    <button class="scroll-btn" id="scrollBottomBtn" onclick="scrollToBottom()">▼</button>
    <div id="log-container">
