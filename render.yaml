services:
  - type: web
    name: autoflow-dashboard
    runtime: docker
    plan: starter # Recommended for Playwright (512MB RAM minimum)
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RENDER
        value: "true"
    healthCheckPath: /
    autoDeploy: true
